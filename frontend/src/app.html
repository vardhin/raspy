<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- No-FOUC: set data-color/concept/mode from the persisted choice before
		     first paint. Full token values apply on hydration; this prevents a
		     light→dark flash by seeding critical bg/fg via [data-mode] in app.css. -->
		<script>
			(function () {
				var r = document.documentElement;
				try {
					var raw = localStorage.getItem('raspy.theme');
					var c = raw ? JSON.parse(raw) : null;
					if (c && c.color) r.dataset.color = c.color;
					if (c && c.concept) r.dataset.concept = c.concept;
					// crude but flash-free: light theme ids carry one of these tokens.
					var id = (c && c.color) || '';
					r.dataset.mode = /light|latte|dawn|day|lotus|lighter/.test(id) ? 'light' : 'dark';
				} catch (e) {
					r.dataset.mode = 'dark';
				}
				// No-FOUC wallpaper: seed the scrim + flag (and a Vibe url, a stable
				// same-origin path) before paint. Uploaded blobs resolve on hydration.
				try {
					var wraw = localStorage.getItem('raspy.wallpaper');
					var w = wraw ? JSON.parse(wraw) : null;
					if (w && w.kind && w.kind !== 'none') {
						r.dataset.wallpaper = 'on';
						r.style.setProperty('--wallpaper-dim', String(w.dim != null ? w.dim : 0.35));
						r.style.setProperty('--wallpaper-blur', (w.blur || 0) + 'px');
						if (w.kind === 'vibe' && w.ref) {
							r.style.setProperty('--wallpaper', 'url("/api/att/vibe/image/' + w.ref + '")');
						}
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
